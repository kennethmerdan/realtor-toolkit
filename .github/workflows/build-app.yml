# .github/workflows/build-app.yml
name: Build Native Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Install dependencies
        run: |
          cd native-app
          npm install
      
      - name: Sync Capacitor
        run: |
          cd native-app
          npx cap sync android
      
      - name: Build Android APK
        run: |
          cd native-app/android
          ./gradlew assembleRelease
      
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: android-app
          path: native-app/android/app/build/outputs/apk/release/*.apk
  
  build-ios:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: |
          cd native-app
          npm install
      
      - name: Sync Capacitor
        run: |
          cd native-app
          npx cap sync ios
      
      - name: Build iOS
        run: |
          cd native-app/ios/App
          xcodebuild -scheme App -configuration Release -archivePath build/App.xcarchive archive
      
      - name: Upload iOS build
        uses: actions/upload-artifact@v3
        with:
          name: ios-app
          path: native-app/ios/App/build/App.xcarchive